<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masmorra - NoteQuest</title>
    <style>
        :root { --bg: #050505; --panel: #151515; --text: #eee; --neon: #0fa; --danger: #f44; --gold: #ffd700; --magic: #0ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { background: var(--panel); border: 2px solid var(--danger); padding: 15px; width: 100%; max-width: 600px; border-radius: 8px; margin-bottom: 20px; }
        .escondido { display: none !important; }
        button { background: var(--neon); color: #000; font-weight: bold; padding: 12px; border: none; cursor: pointer; border-radius: 6px; font-size: 14px; width: 100%; margin-bottom: 10px;}
        button.btn-sec { background: transparent; color: var(--neon); border: 1px solid var(--neon); }
        button.btn-perigo { background: #300; color: var(--danger); border: 1px solid var(--danger); }
        button.btn-magia { background: #002244; color: var(--magic); border: 1px solid var(--magic); }
        
        .top-hud { display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding: 10px; border: 1px solid var(--gold); width: 100%; max-width: 600px; border-radius: 6px; margin-bottom: 15px;}
        .mapa-viewport { position: relative; background: #050510; height: 350px; border: 1px solid #44f; overflow: hidden; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-bottom: 15px;}
        .mapa-camada { position: absolute; transition: transform 0.4s ease-out; }
        .sala-node { position: absolute; width: 40px; height: 40px; background: #222; border: 1px solid #777; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s;}
        .sala-node:hover { filter: brightness(1.5); border-color: var(--gold); z-index: 10;}
        .sala-atual { box-shadow: 0 0 15px var(--danger); border-color: var(--danger); background: #400;}
        .porta-node { position: absolute; width: 22px; height: 22px; background: #000; border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; z-index: 5;}

        .log-box { background: #000; border: 1px solid var(--danger); height: 180px; padding: 10px; overflow-y: auto; font-size: 13px; line-height: 1.5; border-radius: 4px; }
        .cartao-monstro { background: #220000; border: 1px solid var(--danger); padding: 10px; text-align: center; border-radius: 4px; width: 120px; cursor: pointer;}
        .cartao-monstro.alvo { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); background: #440000; }
        .cartao-monstro.morto { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }

        #overlay-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #modal-dado { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--gold); padding: 20px; z-index: 1000; text-align: center; border-radius: 8px; width: 90%; max-width: 350px; }
        .grid-dados { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-dado { background: #222; color: var(--gold); border: 2px solid var(--gold); font-size: 24px; padding: 15px; border-radius: 6px;}
        #modal-magias { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #001122; border: 2px solid var(--magic); padding: 20px; z-index: 1000; text-align: center; border-radius: 8px; width: 90%; max-width: 400px; }
        .linha-magia { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #003366; padding: 10px 0; }
    </style>
    <script src="regras.js"></script>
</head>
<body>
    <div class="top-hud">
        <div>
            <span id="hud-nome" style="color: var(--neon); display: block; margin-bottom: 5px; font-weight: bold;">Herói</span>
            <span style="color: var(--danger);">❤️<span id="hud-pv">0</span></span> | 
            <span style="color: var(--gold);">💰<span id="hud-ouro">0</span></span> | 
            <span style="color: #f88;">🍖<span id="hud-prov">0</span></span> | 
            <span style="color: #fa0;">🔥<span id="hud-tocha">0</span></span>
        </div>
        <div style="display: flex; gap: 5px; flex-direction: column;">
            <button class="btn-sec" style="padding: 5px 10px; margin: 0;" onclick="window.location.href='ficha.html'">📜 FICHA</button>
            <button class="btn-perigo" style="padding: 5px 10px; margin: 0;" onclick="window.location.href='selecao.html'">🚪 SAIR</button>
        </div>
    </div>

    <div id="tela-exploracao" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 id="dg-nome" style="color: var(--danger); margin: 0;">Masmorra</h3>
            <span id="dg-status" style="font-size: 13px; color: var(--magic); border: 1px dashed #555; padding: 4px 8px; border-radius: 4px;">Nível: 1</span>
        </div>
        <div style="text-align: center; font-size: 11px; color: #888; margin-bottom: 5px;">Só é possível escapar pelo Portão Principal na sala [0,0].</div>
        
        <div class="mapa-viewport"><div class="mapa-camada" id="camada-masmorra"></div></div>
        
        <button class="btn-perigo" onclick="tentarSairMasmorra()">🏃 SAIR PELA ENTRADA PRINCIPAL</button>
        <div id="log-masmorra" class="log-box" style="margin-top: 10px;"></div>
    </div>

    <div id="tela-combate" class="container escondido" style="border-color: var(--danger);">
        <h2 style="color: var(--danger); text-align: center; margin-top: 0;">⚔️ COMBATE ⚔️</h2>
        <div id="combate-inimigos" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; min-height: 80px;"></div>
        <div id="log-combate" class="log-box" style="height: 150px; border-color: var(--danger); margin-bottom: 15px;"></div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button id="btn-atacar" class="btn-perigo" style="padding: 15px; font-size: 16px; margin: 0;" onclick="turnoJogador()">🗡️ ATACAR (1d6)</button>
            <button id="btn-magia" class="btn-magia" style="padding: 15px; font-size: 16px; margin: 0;" onclick="abrirGrimorio()">✨ MAGIA</button>
        </div>
    </div>

    <div id="overlay-modal" class="escondido"></div>
    <div id="modal-dado" class="escondido">
        <h2 id="titulo-dado" style="color: var(--gold); margin-top: 0;">ROLE O DADO!</h2>
        <p id="desc-dado" style="color: #ccc; font-size: 14px;">Os deuses observam o seu lançamento...</p>
        <div class="grid-dados">
            <button class="btn-dado" onclick="informarDado(1)">1</button><button class="btn-dado" onclick="informarDado(2)">2</button><button class="btn-dado" onclick="informarDado(3)">3</button>
            <button class="btn-dado" onclick="informarDado(4)">4</button><button class="btn-dado" onclick="informarDado(5)">5</button><button class="btn-dado" onclick="informarDado(6)">6</button>
        </div>
    </div>
    <div id="modal-magias" class="escondido">
        <h2 style="color: var(--magic); margin-top: 0;">✨ GRIMÓRIO</h2>
        <div id="lista-magias-combate" style="text-align: left; margin-bottom: 15px;"></div>
        <button class="btn-sec" onclick="fecharGrimorio()">FECHAR</button>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from "./firebase.js";
        
        const CHAR_ID = sessionStorage.getItem('charId');
        let PERSONAGEM = null;
        const REGRAS = window.REGRAS;
        let COMBATE_ATUAL = { ativo: false, monstros: [], alvoIndex: 0, temEspolios: false, isBoss: false };

        if (!CHAR_ID) window.location.href = "selecao.html";

        onAuthStateChanged(auth, async (user) => {
            if (user) carregarJogo(); 
            else window.location.href = "index.html";
        });

        async function carregarJogo() {
            const snap = await getDoc(doc(db, "personagens", CHAR_ID));
            if (snap.exists()) {
                PERSONAGEM = snap.data();
                if(!PERSONAGEM.masmorra) { window.location.href = "mundo.html"; return; }
                atualizarInterface(); desenharMapaMasmorra();
            } else window.location.href = "selecao.html";
        }

        function atualizarInterface() {
            document.getElementById('hud-nome').innerText = PERSONAGEM.nome; document.getElementById('hud-pv').innerText = PERSONAGEM.pv_atual;
            document.getElementById('hud-ouro').innerText = PERSONAGEM.ouro; document.getElementById('hud-prov').innerText = PERSONAGEM.provisoes; document.getElementById('hud-tocha').innerText = PERSONAGEM.tochas;
            document.getElementById('dg-nome').innerText = PERSONAGEM.masmorra.nome; document.getElementById('dg-status').innerText = `Nível: ${PERSONAGEM.masmorra.nivel}`;
        }

        function logMasmorra(msg, cor="#eee") { const div = document.getElementById('log-masmorra'); div.innerHTML += `<div style="color: ${cor}; border-bottom: 1px dashed #333; padding: 4px 0;">> ${msg}</div>`; div.scrollTop = div.scrollHeight; }
        function logCombate(msg, cor="#eee") { const div = document.getElementById('log-combate'); div.innerHTML += `<div style="color: ${cor}; border-bottom: 1px dashed #333; padding: 4px 0;">> ${msg}</div>`; div.scrollTop = div.scrollHeight; }

        let resolveDadoAtual = null;
        window.pedirDado = function(titulo, desc) { return new Promise((resolve) => { document.getElementById('titulo-dado').innerText = titulo; document.getElementById('desc-dado').innerText = desc; document.getElementById('overlay-modal').classList.remove('escondido'); document.getElementById('modal-dado').classList.remove('escondido'); resolveDadoAtual = resolve; }); };
        window.informarDado = function(v) { document.getElementById('overlay-modal').classList.add('escondido'); document.getElementById('modal-dado').classList.add('escondido'); if (resolveDadoAtual) { resolveDadoAtual(v); resolveDadoAtual = null; } };

        function desenharMapaMasmorra() {
            const cam = document.getElementById('camada-masmorra'); cam.innerHTML = "";
            const m = PERSONAGEM.masmorra; const SIZE = 60; 
            cam.style.transform = `translate(${-(m.x * SIZE)}px, ${-(m.y * SIZE)}px)`;

            for(let key in m.mapa) {
                let [sx, sy] = key.split(',').map(Number);
                let div = document.createElement('div'); div.className = "sala-node"; div.innerText = m.mapa[key].icone || "⬛";
                div.style.left = `calc(50% + ${sx * SIZE}px - 20px)`; div.style.top = `calc(50% + ${sy * SIZE}px - 20px)`;
                
                if(sx === m.x && sy === m.y) div.classList.add('sala-atual');
                else {
                    div.title = "Avançar furtivamente para esta sala";
                    div.onclick = () => moverParaSala(sx, sy);
                }
                cam.appendChild(div);

                if (m.mapa[key].portasRestantes > 0 && sx === m.x && sy === m.y) {
                    [[0,-1], [0,1], [1,0], [-1,0]].forEach(d => {
                        let nx = sx + d[0], ny = sy + d[1];
                        if(!m.mapa[`${nx},${ny}`]) {
                            let porta = document.createElement('div'); porta.className = "porta-node"; porta.innerText = "🚪";
                            porta.style.left = `calc(50% + ${sx * SIZE + (d[0]*30)}px - 11px)`; porta.style.top = `calc(50% + ${sy * SIZE + (d[1]*30)}px - 11px)`;
                            porta.onclick = () => interagirPorta(nx, ny, sx, sy); cam.appendChild(porta);
                        }
                    });
                }
            }
            updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); atualizarInterface();
        }

        // ==========================================
        // MECÂNICA DE FURTIVIDADE E MOVIMENTO
        // ==========================================
        window.moverParaSala = async function(nx, ny) {
            let furtividade = await pedirDado("FURTIVIDADE", "Andas pelas sombras dos corredores antigos. Rola 1d6 para passares despercebido pelos perigos remanescentes.");
            
            if (furtividade <= 2) {
                logMasmorra("Fizeste barulho! Algo espreita nas sombras...", "var(--danger)");
                let r1 = await pedirDado("MONSTRO ERRANTE", "Foste emboscado! Rola 1d6 para o encontro."); 
                let r2 = await pedirDado("MONSTRO ERRANTE", "Rola o segundo 1d6.");
                let enc = parseInt(r1) + parseInt(r2);
                let tb = REGRAS.encontros[PERSONAGEM.masmorra.nome] || REGRAS.encontros["Padrao"];
                
                // Movo o personagem de qualquer forma
                PERSONAGEM.masmorra.x = nx; PERSONAGEM.masmorra.y = ny;
                if(tb[enc]) { iniciarCombate(tb[enc]); return; } 
                else logMasmorra("Foi apenas o vento. Continuas vivo.", "#888");
            } else {
                logMasmorra(`Passaste em silêncio. Chegaste à sala [${nx},${ny}].`, "#aaa");
            }
            
            PERSONAGEM.masmorra.x = nx; PERSONAGEM.masmorra.y = ny;
            desenharMapaMasmorra();
        };

        window.interagirPorta = async function(nx, ny, sx, sy) {
            let rP = await pedirDado("A PORTA MISTERIOSA", "Encaras as tábuas de carvalho antigas. Rola 1d6 para descobrir o estado da porta."); 
            let p = REGRAS.estado_porta[rP]; logMasmorra(p.msg, "var(--gold)");
            
            if (p.status === "trancada") { if (confirm("Gastar 1 TOCHA (🔥)?")) { if(PERSONAGEM.tochas > 0) { PERSONAGEM.tochas--; logMasmorra("As chamas derretem a velha fechadura. (-1 🔥)"); } else return alert("Não tens tochas suficientes!"); } else return; }

            PERSONAGEM.masmorra.mapa[`${sx},${sy}`].portasRestantes--;

            let rS = await pedirDado("O QUE SE ESCONDE ALÉM?", "Rola 1d6 para desvendar a geometria do local (1-3 Corredor, 4-6 Sala)."); 
            let tipoArea = rS <= 3 ? "Corredor" : "Sala";
            
            let rDetalhe = await pedirDado(`A FORMA DO ${tipoArea.toUpperCase()}`, "Rola 1d6 na tabela para desenhar o mapa.");
            let seg = REGRAS.segmentos[tipoArea].find(s => s.min <= rDetalhe && s.max >= rDetalhe); 
            
            if (PERSONAGEM.masmorra.nivel >= 3 && tipoArea === "Sala") {
                let rC = await pedirDado("O COVIL DO CHEFE!", "Sentes um calafrio na espinha. Rola 1d6 para determinar o Lorde deste abismo!"); 
                let tb = REGRAS.chefes[PERSONAGEM.masmorra.nome] || REGRAS.chefes["Padrao"];
                PERSONAGEM.masmorra.mapa[`${nx},${ny}`] = { tipo: "Chefe", icone: "💀", portasRestantes: 0, explorada: true };
                PERSONAGEM.masmorra.x = nx; PERSONAGEM.masmorra.y = ny; desenharMapaMasmorra();
                alert(`OS PORTÕES DO INFERNO ABREM-SE!\nEncontraste: ${tb[rC-1]}`); iniciarCombate(tb[rC-1], true); return;
            }

            PERSONAGEM.masmorra.mapa[`${nx},${ny}`] = { tipo: seg.tipo, icone: (tipoArea === "Corredor" ? "🔲" : "💠"), portasRestantes: seg.portas, explorada: true };
            PERSONAGEM.masmorra.x = nx; PERSONAGEM.masmorra.y = ny;
            
            logMasmorra(`🗺️ Nova área: ${seg.tipo} (${seg.desc}).`, "var(--magic)"); desenharMapaMasmorra();

            if (tipoArea === "Sala") {
                let r1 = await pedirDado("TENSÃO NA SALA", "As sombras movem-se. Rola o primeiro 1d6."); let r2 = await pedirDado("TENSÃO NA SALA", "Rola o segundo 1d6.");
                let enc = parseInt(r1) + parseInt(r2);
                if (enc !== 7 && enc !== 8) {
                    let tb = REGRAS.encontros[PERSONAGEM.masmorra.nome] || REGRAS.encontros["Padrao"];
                    if(tb[enc]) { logMasmorra(`⚔️ Inimigo à vista: ${tb[enc]}`, "var(--danger)"); iniciarCombate(tb[enc]); }
                } else logMasmorra("A sala está estranhamente vazia.", "#888");
            }
        };

        window.tentarSairMasmorra = function() {
            if(PERSONAGEM.masmorra.x === 0 && PERSONAGEM.masmorra.y === 0) {
                PERSONAGEM.masmorra = null; 
                updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM).then(() => { 
                    alert("A luz do sol atinge o teu rosto. Conseguiste escapar!");
                    window.location.href = "mundo.html"; 
                });
            } else {
                alert("A porta principal fica na sala [0,0]! Clica nas salas do mapa para navegar furtivamente até à saída.");
            }
        };

        // COMBATE
        function parseMonstroString(str) {
            let qtd = 1; let nome = str;
            let matchQtd = str.match(/^(\d+)\s+(.*)/);
            if (matchQtd) { qtd = parseInt(matchQtd[1]); nome = matchQtd[2]; }
            let pv = 1, dano = 1, habs = [];
            if (nome.includes('(')) {
                let partes = nome.split('(');
                nome = partes[0].trim();
                let stats = partes[1].replace(')', '').split(';');
                stats.forEach(s => {
                    s = s.trim().toLowerCase();
                    if(s.includes('pv')) {
                        let val = parseInt(s.replace(/\D/g, '')); // Extrai apenas os números
                        if(!isNaN(val)) pv = val;
                    } else if(s.includes('dano')) {
                        let val = parseInt(s.replace(/\D/g, '')); // Extrai apenas os números
                        if(!isNaN(val)) dano = val;
                    } else {
                        habs.push(s);
                    }
                });
            }
            let arr = [];
            for(let i=0; i<qtd; i++) {
                arr.push({ nome: qtd > 1 ? `${nome} ${i+1}` : nome, pv_max: pv, pv_atual: pv, dano: dano, habilidades: habs, vivo: true });
            }
            return arr;
        }

        window.iniciarCombate = function(str, isBoss = false) {
            COMBATE_ATUAL = { ativo: true, monstros: parseMonstroString(str), alvoIndex: 0, temEspolios: str.toLowerCase().includes("espólio") || str.toLowerCase().includes("tesouro"), isBoss: isBoss };
            document.getElementById('tela-exploracao').classList.add('escondido'); document.getElementById('tela-combate').classList.remove('escondido');
            document.getElementById('log-combate').innerHTML = ""; logCombate(`As lâminas cruzam-se! Enfrentas: ${str}`, "var(--danger)"); renderizarInimigos();
        };

        function renderizarInimigos() {
            const div = document.getElementById('combate-inimigos'); div.innerHTML = "";
            COMBATE_ATUAL.monstros.forEach((m, index) => {
                let card = document.createElement('div'); card.className = `cartao-monstro ${index === COMBATE_ATUAL.alvoIndex ? 'alvo' : ''} ${!m.vivo ? 'morto' : ''}`;
                card.innerHTML = `<strong style="color:var(--gold)">${m.nome}</strong><br>❤️ ${m.pv_atual}/${m.pv_max}<br><small>🗡️ ${m.dano}</small>`;
                if(m.vivo) card.onclick = () => { COMBATE_ATUAL.alvoIndex = index; renderizarInimigos(); }; div.appendChild(card);
            });
        }

        window.turnoJogador = async function() {
            let alvo = COMBATE_ATUAL.monstros[COMBATE_ATUAL.alvoIndex]; if(!alvo || !alvo.vivo) return alert("Tens de mirar num inimigo vivo!");
            let rD = parseInt(await pedirDado("O GOLPE DE MISERICÓRDIA", "Rola 1d6 para determinar o teu dano."));
            let mD = 0; if(PERSONAGEM.arma_dano.includes('+')) mD = parseInt(PERSONAGEM.arma_dano.split('+')[1]); else if(PERSONAGEM.arma_dano.includes('-')) mD = -parseInt(PERSONAGEM.arma_dano.split('-')[1]);
            let dF = Math.max(0, rD + mD); let msg = `⚔️ Atacaste [Dado ${rD}]: ${dF} de dano!`;
            
            if (rD === 6 && alvo.habilidades.some(h => h.includes("ponto fraco"))) { dF *= 2; msg += " (UM GOLPE CRÍTICO!)"; }
            if (rD === 1 && alvo.habilidades.some(h => h.includes("regen"))) { alvo.pv_atual = Math.min(alvo.pv_max, alvo.pv_atual + 6); msg += " (A criatura regenerou-se!)"; }
            if (rD === 1 && alvo.habilidades.some(h => h.includes("explosivo"))) { PERSONAGEM.pv_atual -= alvo.pv_atual; msg += " 💥 A CRIATURA EXPLODIU!"; dF = 999; }
            
            aplicarDanoMonstro(alvo, dF, msg);
        };

        window.abrirGrimorio = function() {
            if(!PERSONAGEM.magias || PERSONAGEM.magias.length === 0) return alert("A tua mente não domina as artes arcanas!");
            let lista = document.getElementById('lista-magias-combate'); lista.innerHTML = "";
            PERSONAGEM.magias.forEach((m, idx) => {
                let div = document.createElement('div'); div.className = "linha-magia";
                div.innerHTML = `<div><strong style="color:var(--magic)">${m.nome}</strong> (${m.usos} usos)</div><button class="btn-magia" style="padding:5px 10px;" onclick="usarMagia(${idx})" ${m.usos <= 0 ? 'disabled' : ''}>CONJURAR</button>`;
                lista.appendChild(div);
            });
            document.getElementById('overlay-modal').classList.remove('escondido'); document.getElementById('modal-magias').classList.remove('escondido');
        };
        window.fecharGrimorio = function() { document.getElementById('overlay-modal').classList.add('escondido'); document.getElementById('modal-magias').classList.add('escondido'); };

        window.usarMagia = async function(idx) {
            fecharGrimorio(); let magia = PERSONAGEM.magias[idx]; if(magia.usos <= 0) return;
            magia.usos--; updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM);
            let alvo = COMBATE_ATUAL.monstros[COMBATE_ATUAL.alvoIndex]; if(!alvo || !alvo.vivo) return;
            let rD = parseInt(await pedirDado("PALAVRAS DE PODER", `Invocar ${magia.nome}! Rola 1d6 para o efeito cósmico.`));
            logCombate(`✨ A magia crepita nas tuas mãos!`, "var(--magic)");
            if(magia.nome.toLowerCase().includes("cura") || magia.nome.toLowerCase().includes("vida")) { PERSONAGEM.pv_atual = Math.min(PERSONAGEM.pv_maximo, PERSONAGEM.pv_atual + rD); logCombate(`O teu sangue ferve e curas ${rD} PV!`, "var(--neon)"); atualizarInterface(); turnoMonstros(); } 
            else { aplicarDanoMonstro(alvo, rD + 2, `Magia [Dado ${rD}]: Devastaste o monstro com ${rD + 2} de dano!`); }
        };

        function aplicarDanoMonstro(alvo, dano, msg) {
            alvo.pv_atual -= dano; logCombate(msg, "var(--neon)");
            if (alvo.pv_atual <= 0) { alvo.pv_atual = 0; alvo.vivo = false; logCombate(`💀 O ${alvo.nome} desaba sem vida!`, "#888"); }
            renderizarInimigos();
            if (COMBATE_ATUAL.monstros.every(m => !m.vivo)) { 
                logCombate("VITÓRIA! O silêncio regressa à sala.", "var(--gold)"); 
                verificarLoot(); 
            } else turnoMonstros();
        }

        function turnoMonstros() {
            let d = 0; COMBATE_ATUAL.monstros.forEach(m => { if(m.vivo) d += m.dano; });
            if (d > 0) { 
                PERSONAGEM.pv_atual -= d; logCombate(`Sangras! O inimigo causa ${d} de dano!`, "var(--danger)"); atualizarInterface(); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); 
                if (PERSONAGEM.pv_atual <= 0) { alert("Caíste em batalha. O teu nome será esquecido no tempo..."); window.location.href = "selecao.html"; } 
            }
        }

        async function verificarLoot() {
            if(COMBATE_ATUAL.isBoss) {
                logCombate("A besta monumental cai morta. Um brilho emana dos seus restos...", "var(--gold)");
                let rL = parseInt(await pedirDado("O TESOURO DO CHEFE", "Rola 1d6 na Tabela de Tesouro Maior!"));
                // Loot simples de Boss (adapte as regras reais do NoteQuest aqui se precisar)
                let ouroGanhado = rL * 10;
                PERSONAGEM.ouro += ouroGanhado;
                logCombate(`💰 O baú do Boss revelou ${ouroGanhado} de Ouro!`, "var(--gold)");
                
                alert("CONCLUÍSTE A MASMORRA! És uma lenda viva.");
                PERSONAGEM.masmorra = null; // Reseta a masmorra
                updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM).then(() => { window.location.href = "mundo.html"; });
                return;
            }

            if(COMBATE_ATUAL.temEspolios) {
                let rL = parseInt(await pedirDado("VASGULHAR CORPOS", "Procuras por algo de valor. Rola 1d6 na Tabela de Espólios."));
                let recompensa = REGRAS.espolios[rL] || "Nada";
                logCombate(`🎁 Encontraste: ${recompensa}`, "var(--gold)");
                if(rL === 3) PERSONAGEM.ouro += Math.floor(Math.random() * 6) + 1;
                if(rL === 4) PERSONAGEM.ouro += (Math.floor(Math.random() * 6) + 1) + (Math.floor(Math.random() * 6) + 1);
                if(rL >= 5) PERSONAGEM.ouro += 10; // Exemplo simplificado
                atualizarInterface();
            }
            updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM);
            setTimeout(() => { COMBATE_ATUAL.ativo = false; document.getElementById('tela-combate').classList.add('escondido'); document.getElementById('tela-exploracao').classList.remove('escondido'); desenharMapaMasmorra(); }, 2500); 
        }
    </script>
</body>
