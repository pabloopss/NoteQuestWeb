<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ao Vivo - Vôlei do Tio Budog</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #2c3e50; color: white; text-align: center; }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        
        /* Placar Principal */
        .placar-container { display: flex; justify-content: space-around; background: #34495e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .time-box { flex: 1; margin: 0 10px; }
        .nome-time { font-size: 20px; color: #bdc3c7; text-transform: uppercase; font-weight: bold; }
        .pontos { font-size: 80px; font-weight: bold; margin: 10px 0; color: #ecf0f1; }
        
        .jogadores-quadra-container { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .jogadores-coluna { flex: 1; background: #1a252f; padding: 15px; border-radius: 8px; min-width: 140px; }
        .jogadores-coluna h3 { margin-top: 0; color: #3498db; }
        .lista-nomes-quadra { font-size: 16px; line-height: 1.8; text-align: left; }
        
        #status { font-size: 14px; color: #f39c12; margin-bottom: 15px; font-weight: bold; }
        .status-andamento { color: #2ecc71; font-size: 24px; margin-top: 10px; font-weight: bold; background-color: #1a252f; padding: 10px; border-radius: 8px; display: inline-block; }

        /* Nova Seção: Fila de Espera / Próximos Times */
        .titulo-fila { margin-top: 40px; color: #f1c40f; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        .proximos-times-container { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .proximo-time-box { background: #273746; padding: 15px; border-radius: 8px; min-width: 200px; text-align: left; border: 1px solid #34495e; }
        .proximo-time-box h4 { margin-top: 0; color: #e67e22; text-align: center; border-bottom: 1px dashed #7f8c8d; padding-bottom: 5px; }
        .vazio { color: #7f8c8d; font-style: italic; }
        .exp { color: #ecf0f1; }
        .ini { color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>🏐 Vôlei do Tio Budog</h1>
    <div id="status">🟡 Conectando à quadra...</div>
    
    <div id="statusJogo" class="status-andamento"></div>

    <div class="placar-container">
        <div class="time-box">
            <div class="nome-time">Time A</div>
            <div id="pontosA" class="pontos">0</div>
        </div>
        <div class="time-box">
            <div class="nome-time">Time B</div>
            <div id="pontosB" class="pontos">0</div>
        </div>
    </div>

    <div class="jogadores-quadra-container">
        <div class="jogadores-coluna">
            <h3>Time A</h3>
            <div id="listaTimeA" class="lista-nomes-quadra">Aguardando formação...</div>
        </div>
        <div class="jogadores-coluna">
            <h3>Time B</h3>
            <div id="listaTimeB" class="lista-nomes-quadra">Aguardando formação...</div>
        </div>
    </div>

    <h2 class="titulo-fila">📋 Próximos Times na Fila</h2>
    <div id="proximosTimesContainer" class="proximos-times-container">
        <p class="vazio">Aguardando jogadores na fila...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVNJpud6rhUHEWZxBSJ-o-8WcMtexk6yw",
            authDomain: "notequestweb.firebaseapp.com",
            projectId: "notequestweb",
            storageBucket: "notequestweb.firebasestorage.app",
            messagingSenderId: "1062376453055",
            appId: "1:1062376453055:web:f06d234ff7b194dcf4670a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection('volei').doc('partidaAtual').onSnapshot((doc) => {
            const statusLabel = document.getElementById('status');
            
            if (doc.exists) {
                statusLabel.innerText = "🟢 Ao Vivo e Conectado";
                statusLabel.style.color = "#2ecc71";
                
                const dados = doc.data();

                // Placar
                document.getElementById('pontosA').innerText = dados.pontos ? dados.pontos.A : 0;
                document.getElementById('pontosB').innerText = dados.pontos ? dados.pontos.B : 0;

                // Status de Jogo
                const statusJogo = document.getElementById('statusJogo');
                if (dados.partidaEmAndamento) {
                    statusJogo.innerText = "🏐 Partida em Andamento!";
                    statusJogo.style.color = "#2ecc71";
                } else if (dados.mensagemVencedor && dados.mensagemVencedor !== "") {
                    statusJogo.innerText = dados.mensagemVencedor + " (Aguardando próxima partida...)";
                    statusJogo.style.color = "#f1c40f"; 
                } else {
                    statusJogo.innerText = "⏸️ Aguardando Início da Partida...";
                    statusJogo.style.color = "#bdc3c7";
                }

                // Times Atuais
                const formataJogadores = (time) => time && time.length > 0 ? time.map(j => "• " + j.nome).join('<br>') : "Vazio";
                document.getElementById('listaTimeA').innerHTML = formataJogadores(dados.timeA);
                document.getElementById('listaTimeB').innerHTML = formataJogadores(dados.timeB);

                // LÓGICA DO PREVISOR DE PRÓXIMOS TIMES
                let expEspera = dados.filaExperientes ? [...dados.filaExperientes] : [];
                let iniEspera = dados.filaIniciantes ? [...dados.filaIniciantes] : [];
                
                let htmlProximos = "";
                let contadorTime = 1;

                if (expEspera.length === 0 && iniEspera.length === 0) {
                    htmlProximos = "<p class='vazio'>A fila de espera está vazia no momento.</p>";
                } else {
                    while (expEspera.length > 0 || iniEspera.length > 0) {
                        
                        let timeExp = expEspera.splice(0, 4);
                        let timeIni = iniEspera.splice(0, 2);

                        let listaHTML = "";

                        // Preenche as vagas de Experiente (sem o texto (Exp))
                        for (let i = 0; i < 4; i++) {
                            if (timeExp[i]) {
                                listaHTML += `<span class="exp">• ${timeExp[i].nome}</span><br>`;
                            } else {
                                listaHTML += `<span class="vazio">• Aguardando Experiente...</span><br>`;
                            }
                        }

                        // Preenche as vagas de Iniciante (sem o texto (Ini))
                        for (let i = 0; i < 2; i++) {
                            if (timeIni[i]) {
                                listaHTML += `<span class="ini">• ${timeIni[i].nome}</span><br>`;
                            } else {
                                listaHTML += `<span class="vazio">• Aguardando Iniciante...</span><br>`;
                            }
                        }

                        htmlProximos += `
                            <div class="proximo-time-box">
                                <h4>Próximo Time ${contadorTime}</h4>
                                <div class="lista-nomes-quadra">
                                    ${listaHTML}
                                </div>
                            </div>
                        `;
                        contadorTime++;
                    }
                }
                
                document.getElementById('proximosTimesContainer').innerHTML = htmlProximos;

            } else {
                statusLabel.innerText = "🔴 Aguardando o Juiz criar a primeira partida...";
                statusLabel.style.color = "#e74c3c";
            }
        }, (error) => {
            document.getElementById('status').innerText = "🔴 Erro de Conexão: " + error.message;
            document.getElementById('status').style.color = "#e74c3c";
        });
    </script>
</body>
</html>
