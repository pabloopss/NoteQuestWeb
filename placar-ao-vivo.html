<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ao Vivo - Vôlei do Tio Budog</title>
    <style>
        /* Estilos focados em visualização clara para celular */
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #2c3e50; color: white; text-align: center; }
        h1 { color: #f1c40f; }
        .placar-container { display: flex; justify-content: space-around; background: #34495e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .time-box { flex: 1; margin: 0 10px; }
        .nome-time { font-size: 20px; color: #bdc3c7; text-transform: uppercase; }
        .pontos { font-size: 80px; font-weight: bold; margin: 10px 0; color: #ecf0f1; }
        .jogadores-lista { text-align: left; background: #1a252f; padding: 15px; border-radius: 8px; margin-top: 15px; min-height: 100px;}
        h3 { margin-top: 0; color: #3498db; }
    </style>
</head>
<body>

    <h1>🏐 Vôlei do Tio Budog</h1>
    <p>Acompanhe a partida em tempo real!</p>

    <div class="placar-container">
        <div class="time-box">
            <div class="nome-time">Rei da Quadra</div>
            <div id="pontosA" class="pontos">0</div>
        </div>

        <div class="time-box">
            <div class="nome-time">Desafiante</div>
            <div id="pontosB" class="pontos">0</div>
        </div>
    </div>

    <div style="display: flex; gap: 15px; margin-top: 20px;">
        <div class="jogadores-lista" style="flex: 1;">
            <h3>Time A</h3>
            <div id="listaTimeA">Aguardando jogadores...</div>
        </div>
        <div class="jogadores-lista" style="flex: 1;">
            <h3>Time B</h3>
            <div id="listaTimeB">Aguardando jogadores...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 2. SUA CONFIGURAÇÃO DO FIREBASE (Copie do seu console do Firebase)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_ID",
            appId: "SEU_APP_ID"
        };

        // 3. INICIALIZANDO O FIREBASE
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 4. LÓGICA DE ESCUTA (A Mágica do Tempo Real)
        // O '.on' fica escutando qualquer mudança na pasta 'partidaAtual'
        database.ref('partidaAtual').on('value', (snapshot) => {
            const dados = snapshot.val();

            // Se existir dados no banco, atualizamos a tela
            if (dados) {
                // Atualiza Placar
                document.getElementById('pontosA').innerText = dados.pontos ? dados.pontos.A : 0;
                document.getElementById('pontosB').innerText = dados.pontos ? dados.pontos.B : 0;

                // Atualiza Nomes dos Jogadores
                // O map percorre o array de jogadores e extrai só o nome, depois o join junta tudo com <br>
                const formataJogadores = (time) => {
                    return time && time.length > 0 ? time.map(j => j.nome).join('<br>') : "Vazio";
                };

                document.getElementById('listaTimeA').innerHTML = formataJogadores(dados.timeA);
                document.getElementById('listaTimeB').innerHTML = formataJogadores(dados.timeB);
            }
        });
    </script>
</body>
</html>
