<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre - NoteQuest</title>
    <style>
        body { background: #111; color: #eee; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #d0f; text-align: center; margin-top: 0; }
        .card { background: #222; border: 1px solid #d0f; padding: 15px; margin-bottom: 20px; border-radius: 5px; width: 100%; max-width: 800px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #555; padding: 8px; text-align: left; }
        th { background: #333; color: #0fa; }
        button { background: #d0f; color: #fff; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: inherit; margin-bottom: 5px; }
        button:hover { filter: brightness(1.2); }
        button.btn-del { background: #f44; }
        button.btn-sec { background: transparent; color: #0fa; border: 1px solid #0fa; }
        input { background: #000; color: #fff; border: 1px solid #555; padding: 10px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .escondido { display: none !important; }
        .login-box { max-width: 400px; width: 100%; background: #1a1a1a; padding: 20px; border: 2px solid #0fa; text-align: center; margin-top: 50px; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="tela-login-gm" class="login-box">
        <h2 style="color: #0fa; margin-top: 0;">ACESSO RESTRITO (GM)</h2>
        <input type="email" id="gm-email" placeholder="E-mail do Mestre">
        <input type="password" id="gm-senha" placeholder="Palavra-passe secreta">
        <button id="btn-login-gm" style="background: #0fa; color: #000; width: 100%;">ENTRAR NO PAINEL</button>
        <p id="msg-erro" style="color: #f44; font-size: 13px; margin-top: 15px;"></p>
    </div>

    <div id="painel-gm" class="escondido" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div style="width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px;">
            <h1 style="margin: 0;">👁️ VISÃO DO MESTRE</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn-sec" onclick="jogarComoGM()">🎮 IR PARA O JOGO</button>
                <button onclick="deslogarGm()" style="background: #555;">🚪 SAIR</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-top: 0; color: var(--gold);">🌍 Gestão de Mundos</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="novo-mundo" placeholder="Ex: Mundo Delta" style="flex: 2; margin: 0;">
                <button onclick="criarMundo()" style="flex: 1; margin: 0;">➕ CRIAR MUNDO</button>
            </div>
            <table>
                <thead><tr><th>Nome do Servidor</th><th>Ações</th></tr></thead>
                <tbody id="lista-mundos"><tr><td colspan="2">A carregar...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; color: #0fa;">🦸 Personagens Ativos</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Herói</th><th>Raça/Classe</th><th>Servidor</th><th>Ações</th></tr></thead>
                    <tbody id="lista-personagens"><tr><td colspan="4">A carregar...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, collection, getDocs, doc, deleteDoc, setDoc, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "./firebase.js";

        const EMAIL_DO_MESTRE = "pabloss.ti@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === EMAIL_DO_MESTRE) {
                    document.getElementById('tela-login-gm').classList.add('escondido');
                    document.getElementById('painel-gm').classList.remove('escondido');
                    carregarMundos();
                    carregarPersonagens();
                } else {
                    document.getElementById('msg-erro').innerText = "Acesso negado!";
                    signOut(auth);
                }
            } else {
                document.getElementById('tela-login-gm').classList.remove('escondido');
                document.getElementById('painel-gm').classList.add('escondido');
            }
        });

        document.getElementById('btn-login-gm').onclick = () => {
            const email = document.getElementById('gm-email').value;
            const senha = document.getElementById('gm-senha').value;
            document.getElementById('msg-erro').innerText = "A verificar...";
            document.getElementById('msg-erro').style.color = "#0fa";
            signInWithEmailAndPassword(auth, email, senha).catch(error => { document.getElementById('msg-erro').style.color = "#f44"; document.getElementById('msg-erro').innerText = "Erro: " + error.message; });
        };

        window.deslogarGm = () => { signOut(auth); };

        window.jogarComoGM = () => {
            sessionStorage.setItem('modo_jogador', 'true');
            window.location.href = "selecao.html";
        };

        window.criarMundo = async function() {
            const nome = document.getElementById('novo-mundo').value;
            if(!nome) return alert("Digita um nome para o mundo!");
            await setDoc(doc(db, "mundos", nome), { "0,0": { terreno: "Cidade Humana", masmorra: null } });
            document.getElementById('novo-mundo').value = "";
            carregarMundos();
        };

        window.deletarMundo = async function(nome) {
            if(confirm(`Queres mesmo apagar o servidor '${nome}'? O mundo será destruído!`)) {
                await deleteDoc(doc(db, "mundos", nome));
                carregarMundos();
            }
        };

        async function carregarMundos() {
            const tbody = document.getElementById('lista-mundos'); tbody.innerHTML = "";
            const querySnapshot = await getDocs(collection(db, "mundos"));
            if(querySnapshot.empty) { tbody.innerHTML = "<tr><td colspan='2'>Nenhum mundo criado.</td></tr>"; return; }
            querySnapshot.forEach((docSnap) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td><strong>${docSnap.id}</strong></td> <td><button class="btn-del" onclick="deletarMundo('${docSnap.id}')">Excluir Servidor</button></td>`;
                tbody.appendChild(tr);
            });
        }

        async function carregarPersonagens() {
            const tbody = document.getElementById('lista-personagens'); tbody.innerHTML = "";
            const querySnapshot = await getDocs(collection(db, "personagens"));
            if(querySnapshot.empty) { tbody.innerHTML = "<tr><td colspan='4'>Ainda não existem heróis.</td></tr>"; return; }
            querySnapshot.forEach((docSnap) => {
                let p = docSnap.data(); let tr = document.createElement('tr');
                // Adicionado a coluna do servidor para o mestre saber onde ele está jogando
                tr.innerHTML = `<td><strong style="color:#0fa;">${p.nome}</strong></td> <td>${p.raca}/${p.classe}</td> <td>${p.servidor || 'Desconhecido'}</td> <td><button class="btn-del" onclick="deletarPersonagem('${docSnap.id}')">Executar</button></td>`;
                tbody.appendChild(tr);
            });
        }

        window.deletarPersonagem = async function(charId) {
            if(confirm("Executar este herói para sempre?")) { await deleteDoc(doc(db, "personagens", charId)); carregarPersonagens(); }
        };
    </script>
</body>
</html>
