<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo - NoteQuest</title>
    <style>
        :root { --bg: #050505; --panel: #151515; --text: #eee; --neon: #0fa; --danger: #f44; --gold: #ffd700; --magic: #0ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { background: var(--panel); border: 2px solid var(--neon); padding: 15px; width: 100%; max-width: 600px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 170, 0.1); margin-bottom: 20px; }
        .escondido { display: none !important; }
        button { background: var(--neon); color: #000; font-weight: bold; font-family: inherit; padding: 12px; border: none; cursor: pointer; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        button.btn-sec { background: transparent; color: var(--neon); border: 1px solid var(--neon); }
        button.btn-perigo { background: #300; color: var(--danger); border: 1px solid var(--danger); }
        
        .top-hud { display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding: 10px; border: 1px solid var(--gold); width: 100%; max-width: 600px; border-radius: 6px; margin-bottom: 15px;}
        .mapa-viewport { position: relative; background: #050510; height: 350px; border: 1px solid #44f; overflow: hidden; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-bottom: 15px;}
        .mapa-camada { position: absolute; transition: transform 0.4s ease-out; }
        
        .hex-node { position: absolute; width: 50px; height: 44px; background: #1a1a1a; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; user-select: none; transition: 0.2s; color: #aaa; box-shadow: inset 0 0 0 2px #555;}
        .hex-atual { background: #003311; box-shadow: inset 0 0 0 3px var(--neon); z-index: 5;}
        .hex-unexplored { background: #000; color: #333; opacity: 0.7;}
        .log-box { background: #000; border: 1px solid var(--neon); height: 120px; padding: 10px; overflow-y: auto; font-size: 13px; line-height: 1.5; border-radius: 4px; }
        
        .cartao-monstro { background: #220000; border: 1px solid var(--danger); padding: 10px; text-align: center; border-radius: 4px; width: 120px; cursor: pointer; transition: 0.2s;}
        .cartao-monstro.alvo { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); background: #440000; }
        .cartao-monstro.morto { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }

        #overlay-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #modal-dado { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--gold); padding: 20px; z-index: 1000; text-align: center; border-radius: 8px; width: 90%; max-width: 350px; }
        .grid-dados { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-dado { background: #222; color: var(--gold); border: 2px solid var(--gold); font-size: 24px; padding: 15px; border-radius: 6px;}
    </style>
    <script src="regras.js"></script>
</head>
<body>

    <div class="top-hud">
        <div>
            <span id="hud-nome" style="color: var(--neon); display: block; margin-bottom: 5px; font-weight: bold;">Herói</span>
            <span style="color: var(--danger);">❤️<span id="hud-pv">0</span></span> | 
            <span style="color: var(--gold);">💰<span id="hud-ouro">0</span></span> | 
            <span style="color: #f88;">🍖<span id="hud-prov">0</span></span> | 
            <span style="color: #fa0;">🔥<span id="hud-tocha">0</span></span>
        </div>
        <div style="display: flex; gap: 5px; flex-direction: column;">
            <button class="btn-sec" style="padding: 5px 10px; margin: 0;" onclick="window.location.href='ficha.html'">📜 FICHA</button>
            <button class="btn-perigo" style="padding: 5px 10px; margin: 0;" onclick="window.location.href='selecao.html'">🚪 HERÓIS</button>
        </div>
    </div>

    <div id="tela-exploracao" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; color: #fff;" id="hex-coord">MAPA-MÚNDI [0,0]</h3>
            <span id="hud-servidor" style="font-size: 12px; color: var(--magic);">Mundo</span>
        </div>
        
        <div class="mapa-viewport"><div class="mapa-camada" id="camada-mundo"></div></div>
        
        <div style="background: #0a0a0a; border: 1px dashed #555; padding: 15px; text-align: center; border-radius: 6px;">
            <div id="hex-terreno" style="color: var(--gold); font-size: 20px; font-weight: bold;">A Carregar...</div>
            <div id="hex-masmorra" style="color: var(--magic); font-size: 14px; margin-bottom: 10px; font-weight: bold; margin-top: 5px;">Masmorra: Nenhuma</div>
            
            <div id="acoes-cidade" class="escondido" style="display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-sec" style="width: auto;" onclick="tavernaBoatos()">🍺 Boatos (1g)</button>
                <button class="btn-sec" style="width: auto;" onclick="descansarEstalagem()">🛌 Curar (1g)</button>
                <button class="btn-sec" style="width: auto;" onclick="comprarItem('tochas')">🔥 Tocha (1g)</button>
                <button class="btn-sec" style="width: auto;" onclick="comprarItem('provisoes')">🍖 Prov. (1g)</button>
            </div>
            
            <button id="btn-entrar-masmorra" class="escondido" style="background: var(--danger); color: #fff; margin-top: 15px; width: 100%;" onclick="entrarMasmorra()">⚔️ ENTRAR NA MASMORRA (-1 🔥)</button>
        </div>
        <div id="log-mundo" class="log-box" style="margin-top: 15px;"></div>
    </div>

    <div id="tela-combate" class="container escondido" style="border-color: var(--danger);">
        <h2 style="color: var(--danger); text-align: center; margin-top: 0;">⚔️ EMBOSCADA! ⚔️</h2>
        <div id="combate-inimigos" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; min-height: 80px;"></div>
        <div id="log-combate" class="log-box" style="height: 150px; border-color: var(--danger); margin-bottom: 15px;"></div>
        <button id="btn-atacar" class="btn-perigo" style="padding: 15px; font-size: 16px; width: 100%; margin-bottom: 10px;" onclick="turnoJogador()">🗡️ ATACAR (1d6)</button>
        <button id="btn-fugir-combate" class="btn-sec" style="width: 100%;" onclick="fugirCombate()">🏃 TENTAR FUGIR</button>
    </div>

    <div id="overlay-modal" class="escondido"></div>
    <div id="modal-dado" class="escondido">
        <h2 id="titulo-dado" style="color: var(--gold); margin-top: 0;">ROLE O DADO!</h2>
        <p id="desc-dado" style="color: #ccc; font-size: 14px;">O destino aguarda o seu lançamento...</p>
        <div class="grid-dados">
            <button class="btn-dado" onclick="informarDado(1)">1</button><button class="btn-dado" onclick="informarDado(2)">2</button><button class="btn-dado" onclick="informarDado(3)">3</button>
            <button class="btn-dado" onclick="informarDado(4)">4</button><button class="btn-dado" onclick="informarDado(5)">5</button><button class="btn-dado" onclick="informarDado(6)">6</button>
        </div>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, updateDoc, setDoc, onSnapshot, onAuthStateChanged } from "./firebase.js";
        
        const CHAR_ID = sessionStorage.getItem('charId');
        const SERVIDOR_ATUAL = sessionStorage.getItem('servidorAtual') || "Mundo Alpha";
        let PERSONAGEM = null; 
        let MAPA_GLOBAL = {}; 
        const REGRAS = window.REGRAS; 
        let COMBATE_ATUAL = { ativo: false, monstros: [], alvoIndex: 0 };

        if (!CHAR_ID) window.location.href = "selecao.html";

        onAuthStateChanged(auth, async (user) => {
            if (user) { carregarJogo(); } 
            else window.location.href = "index.html";
        });

        async function carregarJogo() {
            const snap = await getDoc(doc(db, "personagens", CHAR_ID));
            if (snap.exists()) {
                PERSONAGEM = snap.data();
                if (PERSONAGEM.mundo.q === undefined) { PERSONAGEM.mundo = { q: 0, r: 0 }; updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); }
                if(PERSONAGEM.masmorra) window.location.href = "masmorra.html"; 
                iniciarListenerMapa();
            } else window.location.href = "selecao.html";
        }

        function iniciarListenerMapa() {
            onSnapshot(doc(db, "mundos", SERVIDOR_ATUAL), (snap) => {
                if (snap.exists() && Object.keys(snap.data()).length > 0) { MAPA_GLOBAL = snap.data(); if(!MAPA_GLOBAL["0,0"]) MAPA_GLOBAL["0,0"] = { terreno: "Cidade Humana", masmorra: null }; } 
                else { MAPA_GLOBAL = { "0,0": { terreno: "Cidade Humana", masmorra: null } }; setDoc(doc(db, "mundos", SERVIDOR_ATUAL), MAPA_GLOBAL); }
                atualizarInterface(); desenharMapa();
            });
        }

        function atualizarInterface() {
            document.getElementById('hud-nome').innerText = PERSONAGEM.nome; document.getElementById('hud-pv').innerText = PERSONAGEM.pv_atual; document.getElementById('hud-ouro').innerText = PERSONAGEM.ouro; document.getElementById('hud-prov').innerText = PERSONAGEM.provisoes; document.getElementById('hud-tocha').innerText = PERSONAGEM.tochas; document.getElementById('hud-servidor').innerText = SERVIDOR_ATUAL;
            const mq = PERSONAGEM.mundo.q; const mr = PERSONAGEM.mundo.r; const hexAtual = MAPA_GLOBAL[`${mq},${mr}`];
            if(!hexAtual) { PERSONAGEM.mundo.q = 0; PERSONAGEM.mundo.r = 0; updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); return; }
            document.getElementById('hex-coord').innerText = `MAPA-MÚNDI [${mq}, ${mr}]`; document.getElementById('hex-terreno').innerText = `${REGRAS.mundo.terrenos_info[hexAtual.terreno].emoji} ${hexAtual.terreno}`;
            const btnCid = document.getElementById('acoes-cidade'); if(hexAtual.terreno.includes("Cidade")) btnCid.classList.remove('escondido'); else btnCid.classList.add('escondido');
            const btnMas = document.getElementById('btn-entrar-masmorra');
            if (hexAtual.masmorra) { document.getElementById('hex-masmorra').innerText = `Masmorra Local: ${hexAtual.masmorra}`; btnMas.classList.remove('escondido'); } 
            else { document.getElementById('hex-masmorra').innerText = "Masmorra: Nenhuma"; btnMas.classList.add('escondido'); }
        }

        function log(msg) { const div = document.getElementById('log-mundo'); div.innerHTML += `<div style="border-bottom: 1px dashed #333; padding: 4px 0;">> ${msg}</div>`; div.scrollTop = div.scrollHeight; }

        let resolveDadoAtual = null;
        window.pedirDado = function(titulo, desc) { return new Promise((resolve) => { document.getElementById('titulo-dado').innerText = titulo; document.getElementById('desc-dado').innerText = desc; document.getElementById('overlay-modal').classList.remove('escondido'); document.getElementById('modal-dado').classList.remove('escondido'); resolveDadoAtual = resolve; }); };
        window.informarDado = function(v) { document.getElementById('overlay-modal').classList.add('escondido'); document.getElementById('modal-dado').classList.add('escondido'); if (resolveDadoAtual) { resolveDadoAtual(v); resolveDadoAtual = null; } };

        const HEX_SIZE = 30; const VIZINHOS_HEX = [ [+1, 0], [+1, -1], [0, -1], [-1, 0], [-1, +1], [0, +1] ];
        function hexParaPixel(q, r) { return { x: HEX_SIZE * (3/2 * q), y: HEX_SIZE * (Math.sqrt(3)/2 * q  +  Math.sqrt(3) * r) }; }

        function desenharMapa() {
            const cam = document.getElementById('camada-mundo'); cam.innerHTML = "";
            const mq = PERSONAGEM.mundo.q; const mr = PERSONAGEM.mundo.r; const c = hexParaPixel(mq, mr); cam.style.transform = `translate(${-c.x}px, ${-c.y}px)`;
            for(let key in MAPA_GLOBAL) {
                let [q, r] = key.split(',').map(Number); let div = document.createElement('div'); div.className = "hex-node"; let p = hexParaPixel(q, r); div.style.left = `calc(50% + ${p.x}px - 25px)`; div.style.top = `calc(50% + ${p.y}px - 22px)`; div.innerText = REGRAS.mundo.terrenos_info[MAPA_GLOBAL[key].terreno].emoji;
                if(q === mq && r === mr) div.classList.add('hex-atual'); else div.onclick = () => viajar(q, r, MAPA_GLOBAL[key]); cam.appendChild(div);
            }
            VIZINHOS_HEX.forEach(dir => {
                let nq = mq + dir[0]; let nr = mr + dir[1]; let key = `${nq},${nr}`;
                if(!MAPA_GLOBAL[key]) { let div = document.createElement('div'); div.className = "hex-node hex-unexplored"; let p = hexParaPixel(nq, nr); div.style.left = `calc(50% + ${p.x}px - 25px)`; div.style.top = `calc(50% + ${p.y}px - 22px)`; div.innerText = "❓"; div.onclick = () => viajar(nq, nr, null); cam.appendChild(div); }
            });
        }

        window.viajar = async function(nq, nr, hexConhecido) {
            let custo = hexConhecido ? REGRAS.mundo.terrenos_info[hexConhecido.terreno].custo : 1; if(PERSONAGEM.provisoes < custo) return alert(`A viagem consome recursos. Faltam-te ${custo} Provisões!`); PERSONAGEM.provisoes -= custo; let key = `${nq},${nr}`;
            if (!MAPA_GLOBAL[key]) {
                log(`Avanças pelos ermos desconhecidos... (-${custo} 🍖)`);
                let rT = await pedirDado("A NATUREZA DO REINO", "Lanças um olhar sobre o horizonte. Role 1d6 para determinar o terreno."); let tNome = REGRAS.mundo.geracao_terreno[rT] || "Planície";
                MAPA_GLOBAL[key] = { terreno: tNome, masmorra: null }; log(`🗺️ Adentras num(a): ${tNome}`);
                let rB = await pedirDado("VIGILÂNCIA", "Procuras sinais de ruínas antigas. Role 1d6 (5 ou 6 encontra algo).");
                if (rB >= 5) { let rM = await pedirDado("A ESTRUTURA", "Uma sombra ergue-se. Role 1d6 para revelar o nome do local."); MAPA_GLOBAL[key].masmorra = REGRAS.tabela_terrenos_masmorra[tNome][rM - 1]; log(`⚠️ DESCOBERTA: ${MAPA_GLOBAL[key].masmorra}!`); }
                await updateDoc(doc(db, "mundos", SERVIDOR_ATUAL), { [key]: MAPA_GLOBAL[key] });
            } else { log(`Viajas por território mapeado... (-${custo} 🍖)`); }
            
            PERSONAGEM.mundo.q = nq; PERSONAGEM.mundo.r = nr; await updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); atualizarInterface(); desenharMapa();

            let hexAtual = MAPA_GLOBAL[key];
            if (!hexAtual.terreno.includes("Cidade")) {
                let r1 = await pedirDado("O PERIGO À ESPREITA (1)", "Os ermos são traiçoeiros. Role o primeiro 1d6."); let r2 = await pedirDado("O PERIGO À ESPREITA (2)", "Role o segundo 1d6 para o Evento de Viagem.");
                let soma = parseInt(r1) + parseInt(r2);
                if (soma <= 6 && REGRAS.eventos[hexAtual.terreno]) {
                    let ev = REGRAS.eventos[hexAtual.terreno][soma] || REGRAS.eventos[hexAtual.terreno][6]; log(`⚠️ EVENTO: ${ev}`);
                    if (ev.includes("PV")) { alert(`Foste apanhado desprevenido!\n${ev}`); iniciarCombate(ev); } 
                    else { if(ev.includes("perde 1 🍖")) PERSONAGEM.provisoes = Math.max(0, PERSONAGEM.provisoes-1); if(ev.includes("perde 2 🍖")) PERSONAGEM.provisoes = Math.max(0, PERSONAGEM.provisoes-2); if(ev.includes("perde 2 PV")) PERSONAGEM.pv_atual = Math.max(0, PERSONAGEM.pv_atual-2); await updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); atualizarInterface(); }
                }
            }
        };

        // ==========================================
        // NOVA GERAÇÃO DE MASMORRA (PORTAS ?)
        // ==========================================
        window.entrarMasmorra = async function() {
            const hexAtual = MAPA_GLOBAL[`${PERSONAGEM.mundo.q},${PERSONAGEM.mundo.r}`]; if(!hexAtual || !hexAtual.masmorra) return;
            if(PERSONAGEM.tochas <= 0) return alert("Precisas de pelo menos 1 Tocha (🔥) para sobreviver na escuridão!");
            PERSONAGEM.tochas--;
            
            let rS = Math.floor(Math.random() * 6) + 1;
            let seg = REGRAS.segmentos["Corredor"].find(s => s.min <= rS && s.max >= rS);
            
            // Gerar posições aleatórias para as portas iniciais
            let dirs = [[0,-1], [0,1], [1,0], [-1,0]].sort(() => Math.random() - 0.5);
            let portasIniciais = [];
            for(let i=0; i<seg.portas; i++) {
                portasIniciais.push({ nx: dirs[i][0], ny: dirs[i][1], status: "?" });
            }
            
            PERSONAGEM.masmorra = {
                nome: hexAtual.masmorra, nivel: 1, x: 0, y: 0, lastX: 0, lastY: 0,
                mapa: { "0,0": { tipo: seg.tipo, icone: "🔲", portas: portasIniciais, monstros: [], explorada: true } }
            };
            
            await updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM);
            window.location.href = "masmorra.html"; 
        };

        window.tavernaBoatos = async function() { if(PERSONAGEM.ouro < 1) return; PERSONAGEM.ouro--; let rol = await pedirDado("RUMORES NA TAVERNA", "Pagas 1 Moeda de Ouro. Rola 1d6 (4+)."); if (rol >= 4) { let dir = VIZINHOS_HEX[Math.floor(Math.random() * 6)]; let key = `${PERSONAGEM.mundo.q + dir[0]},${PERSONAGEM.mundo.r + dir[1]}`; if(!MAPA_GLOBAL[key]) MAPA_GLOBAL[key] = { terreno: "Planície", masmorra: null }; if (!MAPA_GLOBAL[key].masmorra) { let rt = await pedirDado("A LENDA REVELADA", "Rola 1d6 para determinar o local."); MAPA_GLOBAL[key].masmorra = REGRAS.tabela_terrenos_masmorra[MAPA_GLOBAL[key].terreno][rt-1]; log(`🍺 Um novo local foi revelado no teu mapa!`); await updateDoc(doc(db, "mundos", SERVIDOR_ATUAL), { [key]: MAPA_GLOBAL[key] }); } } else log("🍺 O bêbado apenas balbuciou disparates."); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); };
        window.descansarEstalagem = function() { if(PERSONAGEM.ouro > 0){ PERSONAGEM.ouro--; PERSONAGEM.pv_atual = PERSONAGEM.pv_maximo; log("🛌 Uma noite quente e segura. Feridas curadas."); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); }};
        window.comprarItem = function(i) { let limit = (i === 'tochas') ? 10 : 20; if(PERSONAGEM[i] >= limit) return alert(`Limite alcançado!`); if(PERSONAGEM.ouro > 0){ PERSONAGEM.ouro--; PERSONAGEM[i]++; log(`Guardaste 1 ${i} na mochila.`); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); }};

        function parseMonstroString(str) { let qtd = 1; let nome = str; let matchQtd = str.match(/^(\d+)\s+(.*)/); if (matchQtd) { qtd = parseInt(matchQtd[1]); nome = matchQtd[2]; } let pv = 1, dano = 1, habs = []; if (nome.includes('(')) { let partes = nome.split('('); nome = partes[0].trim(); let stats = partes[1].replace(')', '').split(';'); stats.forEach(s => { s = s.trim().toLowerCase(); if(s.includes('pv')) { let val = parseInt(s.replace(/\D/g, '')); if(!isNaN(val)) pv = val; } else if(s.includes('dano')) { let val = parseInt(s.replace(/\D/g, '')); if(!isNaN(val)) dano = val; } else { habs.push(s); } }); } let arr = []; for(let i=0; i<qtd; i++) arr.push({ nome: qtd > 1 ? `${nome} ${i+1}` : nome, pv_max: pv, pv_atual: pv, dano: dano, habilidades: habs, vivo: true }); return arr; }
        
        window.iniciarCombate = function(str) { COMBATE_ATUAL = { ativo: true, monstros: parseMonstroString(str), alvoIndex: 0 }; document.getElementById('tela-exploracao').classList.add('escondido'); document.getElementById('tela-combate').classList.remove('escondido'); document.getElementById('log-combate').innerHTML = ""; logCombate(`As lâminas cruzam-se! Enfrentas: ${str}`, "var(--danger)"); renderizarInimigos(); };
        function renderizarInimigos() { const div = document.getElementById('combate-inimigos'); div.innerHTML = ""; COMBATE_ATUAL.monstros.forEach((m, index) => { let card = document.createElement('div'); card.className = `cartao-monstro ${index === COMBATE_ATUAL.alvoIndex ? 'alvo' : ''} ${!m.vivo ? 'morto' : ''}`; card.innerHTML = `<strong style="color:var(--gold)">${m.nome}</strong><br>❤️ ${m.pv_atual}/${m.pv_max}<br><small>🗡️ ${m.dano}</small>`; if(m.vivo) card.onclick = () => { COMBATE_ATUAL.alvoIndex = index; renderizarInimigos(); }; div.appendChild(card); }); }
        function logCombate(msg, cor="#eee") { const div = document.getElementById('log-combate'); div.innerHTML += `<div style="color: ${cor}; border-bottom: 1px dashed #333; padding: 4px 0;">> ${msg}</div>`; div.scrollTop = div.scrollHeight; }
        
        window.turnoJogador = async function() {
            let alvo = COMBATE_ATUAL.monstros[COMBATE_ATUAL.alvoIndex]; if(!alvo || !alvo.vivo) return alert("Tens de mirar num inimigo vivo!");
            let rD = parseInt(await pedirDado("O GOLPE", "Sentes o peso da tua arma. Rola 1d6.")); let mD = 0; if(PERSONAGEM.arma_dano.includes('+')) mD = parseInt(PERSONAGEM.arma_dano.split('+')[1]); else if(PERSONAGEM.arma_dano.includes('-')) mD = -parseInt(PERSONAGEM.arma_dano.split('-')[1]);
            let dF = Math.max(0, rD + mD); let msg = `Atacaste [Dado ${rD}]: ${dF} de dano!`;
            if (rD === 6 && alvo.habilidades.some(h => h.includes("ponto fraco"))) { dF *= 2; msg += " (GOLPE CRÍTICO!)"; }
            if (rD === 1 && alvo.habilidades.some(h => h.includes("regen"))) { alvo.pv_atual = Math.min(alvo.pv_max, alvo.pv_atual + 6); msg += " (A criatura regenerou-se!)"; }
            if (rD === 1 && alvo.habilidades.some(h => h.includes("explosivo"))) { PERSONAGEM.pv_atual -= alvo.pv_atual; msg += " 💥 A BESTA EXPLODIU!"; dF = 999; }
            alvo.pv_atual -= dF; logCombate(msg, "var(--neon)");
            if (alvo.pv_atual <= 0) { alvo.pv_atual = 0; alvo.vivo = false; logCombate(`💀 O ${alvo.nome} desaba sem vida.`, "#888"); }
            renderizarInimigos();
            if (COMBATE_ATUAL.monstros.every(m => !m.vivo)) { logCombate("VITÓRIA! O caminho está livre.", "var(--gold)"); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); setTimeout(() => { COMBATE_ATUAL.ativo = false; document.getElementById('tela-combate').classList.add('escondido'); document.getElementById('tela-exploracao').classList.remove('escondido'); }, 2000); } else turnoMonstros();
        };
        
        function turnoMonstros() { let d = 0; COMBATE_ATUAL.monstros.forEach(m => { if(m.vivo) d += m.dano; }); if (d > 0) { PERSONAGEM.pv_atual -= d; logCombate(`Ataque implacável: Sofreste ${d} de dano!`, "var(--danger)"); atualizarInterface(); updateDoc(doc(db, "personagens", CHAR_ID), PERSONAGEM); if (PERSONAGEM.pv_atual <= 0) { alert("Caíste em batalha. A tua lenda termina aqui."); window.location.href = "selecao.html"; } } }
        window.fugirCombate = function() { logCombate("Fugiste em pânico para longe da batalha!", "#aaa"); setTimeout(() => { COMBATE_ATUAL.ativo = false; document.getElementById('tela-combate').classList.add('escondido'); document.getElementById('tela-exploracao').classList.remove('escondido'); }, 1500); };
    </script>
</body>
