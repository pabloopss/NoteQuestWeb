<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Juiz - Vôlei</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background-color: #f4f4f9; color: #333; }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        input { flex: 1; min-width: 150px; }
        
        button { color: white; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-primary { background-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-success { background-color: #2ecc71; }
        .btn-warning { background-color: #f39c12; }
        .btn-small { padding: 5px 10px; font-size: 12px; margin-top: 0; margin-bottom: 0; width: auto;} 
        
        .btn-orange { background-color: #e67e22; margin-bottom: 10px; }
        .btn-orange:hover { background-color: #d35400; }
        .btn-verde { background-color: #27ae60; margin-bottom: 15px; }
        .btn-verde:hover { background-color: #2ecc71; }
        
        .placar { display: flex; justify-content: space-around; gap: 10px; font-size: 24px; font-weight: bold; margin: 20px 0; }
        .time-box { text-align: center; flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .controles-ponto { display: flex; gap: 5px; justify-content: center; }
        
        .jogadores-quadra-container { display: flex; gap: 10px; margin-top: 15px; }
        .jogadores-coluna { flex: 1; background: #ecf0f1; padding: 10px; border-radius: 8px; text-align: center; }
        .jogadores-coluna h4 { margin-top: 0; color: #2980b9; }
        .lista-nomes-quadra { font-size: 14px; line-height: 1.6; text-align: left; padding: 0; }

        /* Correção do Switch no Mobile */
        .formato-toggle { background: #e8f4f8; padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; border: 1px solid #bce0ee; }
        .formato-toggle input { width: auto; transform: scale(1.5); cursor: pointer; margin: 0; flex-shrink: 0; }
        .formato-toggle label { font-weight: bold; cursor: pointer; color: #2980b9; text-align: left; line-height: 1.3;}

        ul { list-style-type: none; padding: 0; margin: 0; }
        li { background: #ecf0f1; margin: 5px 0; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;}
        .jogador-quadra-item { background: #fff; margin: 5px 0; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .remove-btn { background: transparent; color: #e74c3c; width: auto; padding: 0 5px; font-size: 18px; margin-bottom: 0; }
        #statusConexao { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #f39c12; }
        
        .iniciante-destaque { color: #d35400; font-weight: bold; }

        /* REGRAS PARA TELAS PEQUENAS (MOBILE) */
        @media (max-width: 600px) {
            .placar { flex-direction: column; }
            .jogadores-quadra-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>🏐 Vôlei do Tio Budog</h1>
    
    <div style="text-align: center; margin-bottom: 15px;">
        <button onclick="window.location.href='historico.html'" class="btn-primary" style="width: auto; padding: 10px 20px;">
            📊 Ver Histórico de Partidas
        </button>
    </div>

    <div id="statusConexao">🟡 Tentando conectar ao banco de dados...</div>

    <div class="card">
        <h2>Partida Atual</h2>
        <div class="placar">
            <div class="time-box">
                <div>Time A</div>
                <div id="pontosA" style="font-size: 40px; margin: 10px 0;">0</div>
                <div class="controles-ponto">
                    <button onclick="marcarPonto('A')" class="btn-success" id="btnPontoA" disabled>+ Ponto</button>
                    <button onclick="removerPonto('A')" class="btn-warning" id="btnMenosPontoA" disabled>- Ponto</button>
                </div>
            </div>
            <div class="time-box">
                <div>Time B</div>
                <div id="pontosB" style="font-size: 40px; margin: 10px 0;">0</div>
                <div class="controles-ponto">
                    <button onclick="marcarPonto('B')" class="btn-success" id="btnPontoB" disabled>+ Ponto</button>
                    <button onclick="removerPonto('B')" class="btn-warning" id="btnMenosPontoB" disabled>- Ponto</button>
                </div>
            </div>
        </div>
        
        <button class="btn-orange" id="btnFormarTimes" onclick="tentarFormarTimes()">📋 Montar Times</button>
        <button onclick="iniciarPartida()" class="btn-verde" id="btnIniciarPartida" disabled>▶️ Iniciar Partida (Travar Times)</button>
        <button onclick="finalizarPartida()" class="btn-danger" id="btnFinalizarPartida" disabled>⏹️ Finalizar Partida</button>
        
        <div class="jogadores-quadra-container">
            <div class="jogadores-coluna">
                <h4>Time A</h4>
                <div id="listaTimeA" class="lista-nomes-quadra">Vazio</div>
                <button onclick="desmontarTime('A')" class="btn-warning btn-small" id="btnDesmontarA" style="margin-top: 10px; width: 100%;">Desmontar Time A</button>
            </div>
            <div class="jogadores-coluna">
                <h4>Time B</h4>
                <div id="listaTimeB" class="lista-nomes-quadra">Vazio</div>
                <button onclick="desmontarTime('B')" class="btn-warning btn-small" id="btnDesmontarB" style="margin-top: 10px; width: 100%;">Desmontar Time B</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Adicionar Jogador</h2>
        <div class="form-group">
            <input type="text" id="nomeJogador" placeholder="Nome do Jogador">
            <select id="nivelJogador">
                <option value="experiente">Experiente</option>
                <option value="iniciante">Iniciante</option>
            </select>
        </div>
        <button class="btn-primary" onclick="adicionarJogador()">Adicionar à Fila</button>
    </div>

    <div class="card">
        <h2>Filas de Espera</h2>
        
        <div class="formato-toggle">
            <input type="checkbox" id="toggleFormato" onchange="alternarFormato()">
            <label for="toggleFormato">Usar formato 5 Experientes e 1 Iniciante</label>
        </div>
        
        <h3>Experientes (<span id="countExp">0</span>)</h3>
        <ul id="listaExperientes"></ul>

        <h3>Iniciantes (<span id="countIni">0</span>)</h3>
        <ul id="listaIniciantes"></ul>

        <hr style="margin: 20px 0; border-top: 1px solid #ccc;">
        <button class="btn-danger" onclick="limparFilas()">🗑️ Apagar Todos das Filas</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVNJpud6rhUHEWZxBSJ-o-8WcMtexk6yw",
            authDomain: "notequestweb.firebaseapp.com",
            projectId: "notequestweb",
            storageBucket: "notequestweb.firebasestorage.app",
            messagingSenderId: "1062376453055",
            appId: "1:1062376453055:web:f06d234ff7b194dcf4670a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let filaExperientes = [];
        let filaIniciantes = [];
        let timeA = []; 
        let timeB = []; 
        let pontos = { A: 0, B: 0 };
        let partidaEmAndamento = false;
        let mensagemVencedor = ""; 
        let formatoCincoUm = false;
        let horaInicioPartida = null;

        db.collection('volei').doc('partidaAtual').onSnapshot((doc) => {
            const status = document.getElementById('statusConexao');
            
            if (doc.exists) {
                const dados = doc.data();
                filaExperientes = dados.filaExperientes || [];
                filaIniciantes = dados.filaIniciantes || [];
                timeA = dados.timeA || [];
                timeB = dados.timeB || [];
                pontos = dados.pontos || { A: 0, B: 0 };
                partidaEmAndamento = dados.partidaEmAndamento || false;
                mensagemVencedor = dados.mensagemVencedor || "";
                formatoCincoUm = dados.formatoCincoUm || false;
                horaInicioPartida = dados.horaInicioPartida || null;
                
                atualizarTela(); 
                
                status.innerText = "🟢 Sincronizado e Online";
                status.style.color = "green";
            } else {
                salvarNoFirestore(); 
            }
        }, (error) => {
            const status = document.getElementById('statusConexao');
            status.innerText = "🔴 Erro de Conexão: " + error.message;
            status.style.color = "red";
        });

        function salvarNoFirestore() {
            db.collection('volei').doc('partidaAtual').set({
                filaExperientes: filaExperientes,
                filaIniciantes: filaIniciantes,
                timeA: timeA,
                timeB: timeB,
                pontos: pontos,
                partidaEmAndamento: partidaEmAndamento,
                mensagemVencedor: mensagemVencedor,
                formatoCincoUm: formatoCincoUm,
                horaInicioPartida: horaInicioPartida
            }).catch(error => {
                console.error("Erro ao salvar:", error);
            });
        }

        function registrarHistorico() {
            const horaFim = new Date().toLocaleString('pt-BR');
            
            const nomesTimeA = timeA.map(j => j.nome);
            const nomesTimeB = timeB.map(j => j.nome);

            db.collection('historico_partidas').add({
                inicio: horaInicioPartida,
                fim: horaFim,
                placarA: pontos.A,
                placarB: pontos.B,
                jogadoresTimeA: nomesTimeA,
                jogadoresTimeB: nomesTimeB,
                formatoUsado: formatoCincoUm ? "5 Experientes / 1 Iniciante" : "4 Experientes / 2 Iniciantes",
                timestampDb: firebase.firestore.FieldValue.serverTimestamp() 
            }).then(() => {
                console.log("Partida salva no histórico com sucesso!");
            }).catch((error) => {
                console.error("Erro ao registrar histórico: ", error);
            });
        }

        function alternarFormato() {
            const checkbox = document.getElementById('toggleFormato');
            formatoCincoUm = checkbox.checked;
            
            if (formatoCincoUm) {
                alert("⚠️ ATENÇÃO: Os times agora serão formados por 5 Experientes e apenas 1 Iniciante!");
            }
            salvarNoFirestore();
        }

        function adicionarJogador() {
            const nomeInput = document.getElementById('nomeJogador');
            const nivel = document.getElementById('nivelJogador').value;
            const nome = nomeInput.value.trim();

            if (nome === "") return alert("Digite o nome.");
            const jogador = { nome: nome, nivel: nivel, id: Date.now() };

            if (nivel === 'experiente') filaExperientes.push(jogador);
            else filaIniciantes.push(jogador);

            nomeInput.value = ""; 
            salvarNoFirestore();
        }

        function removerDaFila(id, nivel) {
            if (nivel === 'experiente') filaExperientes = filaExperientes.filter(j => j.id !== id);
            else filaIniciantes = filaIniciantes.filter(j => j.id !== id);
            salvarNoFirestore();
        }

        function limparFilas() {
            if (filaExperientes.length === 0 && filaIniciantes.length === 0) {
                return alert("As filas já estão vazias!");
            }
            const confirmacao = confirm("⚠️ TEM CERTEZA? Isso vai apagar TODOS os jogadores das filas de espera!");
            if (confirmacao) {
                filaExperientes = [];
                filaIniciantes = [];
                salvarNoFirestore();
            }
        }

        function tentarFormarTimes() {
            const reqExp = formatoCincoUm ? 5 : 4;
            const reqIni = formatoCincoUm ? 1 : 2;

            if (filaExperientes.length >= reqExp && filaIniciantes.length >= reqIni) {
                if (timeA.length === 0) timeA = puxarJogadoresParaTime(reqExp, reqIni);
                if (timeB.length === 0 && filaExperientes.length >= reqExp && filaIniciantes.length >= reqIni) {
                    timeB = puxarJogadoresParaTime(reqExp, reqIni);
                }
                salvarNoFirestore();
            } else {
                alert(`Necessário pelo menos ${reqExp} experientes e ${reqIni} iniciantes na fila para formar um time.`);
            }
        }

        function puxarJogadoresParaTime(qtdExp, qtdIni) {
            const exp = filaExperientes.splice(0, qtdExp); 
            const ini = filaIniciantes.splice(0, qtdIni);
            return exp.concat(ini);
        }

        function desmontarTime(qualTime) {
            if (partidaEmAndamento) {
                return alert("Você não pode desmontar um time durante uma partida!");
            }

            let timeAlvo = (qualTime === 'A') ? timeA : timeB;

            if (timeAlvo.length === 0) return alert("Este time já está vazio.");

            timeAlvo.forEach(jogador => {
                if (jogador.nivel === 'experiente') filaExperientes.push(jogador);
                else filaIniciantes.push(jogador);
            });

            if (qualTime === 'A') timeA = [];
            else timeB = [];

            salvarNoFirestore();
        }

        function retirarJogadorDaPartida(qualTime, indexJogador, categoria) {
            const timeAlvo = qualTime === 'A' ? timeA : timeB;
            const filaAlvo = categoria === 'experiente' ? filaExperientes : filaIniciantes;
            const jogadorSaindo = timeAlvo[indexJogador];

            const querMesmoTrocar = confirm(`Tem certeza que deseja retirar o jogador ${jogadorSaindo.nome} da partida?`);
            if (!querMesmoTrocar) return; 

            if (filaAlvo.length > 0) {
                const jogadorEntrando = filaAlvo.shift();
                timeAlvo[indexJogador] = jogadorEntrando;
                filaAlvo.push(jogadorSaindo); 
                alert(`🔄 ${jogadorSaindo.nome} saiu e o próximo da fila (${jogadorEntrando.nome}) entrou.`);
            } else {
                const confirmarVazio = confirm(`A fila de ${categoria}s está vazia. O time ficará com um jogador a menos. Deseja retirar mesmo assim?`);
                if (confirmarVazio) {
                    timeAlvo.splice(indexJogador, 1);
                    filaAlvo.push(jogadorSaindo);
                } else {
                    return;
                }
            }
            salvarNoFirestore();
        }

        function iniciarPartida() {
            if (timeA.length === 6 && timeB.length === 6) {
                partidaEmAndamento = true;
                mensagemVencedor = ""; 
                horaInicioPartida = new Date().toLocaleString('pt-BR');
                salvarNoFirestore();
            } else {
                alert("Você precisa formar os dois times completos (6 jogadores cada) antes de iniciar.");
            }
        }

        function marcarPonto(time) {
            if(partidaEmAndamento) {
                pontos[time]++;
                salvarNoFirestore();
            }
        }

        function removerPonto(time) {
            if (partidaEmAndamento && pontos[time] > 0) { 
                pontos[time]--;
                salvarNoFirestore();
            }
        }

        function finalizarPartida() {
            if (!partidaEmAndamento) return alert("A partida ainda não foi iniciada.");

            const confirmacao = confirm("Tem certeza que deseja encerrar a partida?\nO vencedor será mantido na sua respectiva quadra e o perdedor irá para o fim da fila de espera.");
            if (!confirmacao) return; 

            registrarHistorico();

            let nomeVencedor;
            
            if (pontos.A > pontos.B) { 
                nomeVencedor = "Time A";
                timeB.forEach(jogador => {
                    if (jogador.nivel === 'experiente') filaExperientes.push(jogador);
                    else filaIniciantes.push(jogador);
                });
                timeB = []; 
            } 
            else if (pontos.B > pontos.A) { 
                nomeVencedor = "Time B";
                timeA.forEach(jogador => {
                    if (jogador.nivel === 'experiente') filaExperientes.push(jogador);
                    else filaIniciantes.push(jogador);
                });
                timeA = []; 
            } 
            else {
                return alert("Jogo empatado! Marque um ponto para definir o vencedor antes de encerrar.");
            }

            mensagemVencedor = `🏆 O ${nomeVencedor} venceu a partida!`;
            pontos = { A: 0, B: 0 };
            partidaEmAndamento = false; 
            horaInicioPartida = null;

            salvarNoFirestore();
        }

        function atualizarTela() {
            document.getElementById('pontosA').innerText = pontos.A;
            document.getElementById('pontosB').innerText = pontos.B;
            document.getElementById('toggleFormato').checked = formatoCincoUm;

            const renderTime = (time, idTime) => {
                if (time.length === 0) return "Vazio";
                return time.map((j, i) => `
                    <div class="jogador-quadra-item">
                        <span class="${j.nivel === 'iniciante' ? 'iniciante-destaque' : ''}">
                            • ${j.nome} ${j.nivel === 'iniciante' ? '(Ini)' : ''}
                        </span>
                        ${partidaEmAndamento ? `<button class="btn-warning btn-small" onclick="retirarJogadorDaPartida('${idTime}', ${i}, '${j.nivel}')">🔄 Trocar</button>` : ''}
                    </div>
                `).join('');
            };

            document.getElementById('listaTimeA').innerHTML = renderTime(timeA, 'A');
            document.getElementById('listaTimeB').innerHTML = renderTime(timeB, 'B');

            document.getElementById('countExp').innerText = filaExperientes.length;
            document.getElementById('countIni').innerText = filaIniciantes.length;

            const renderJogadorFila = (jogador) => `<li>${jogador.nome} <button class="remove-btn" onclick="removerDaFila(${jogador.id}, '${jogador.nivel}')">🗑️</button></li>`;
            document.getElementById('listaExperientes').innerHTML = filaExperientes.map(renderJogadorFila).join('');
            document.getElementById('listaIniciantes').innerHTML = filaIniciantes.map(renderJogadorFila).join('');

            const btnFormarTimes = document.getElementById('btnFormarTimes');
            const btnIniciar = document.getElementById('btnIniciarPartida');
            const btnFinalizar = document.getElementById('btnFinalizarPartida');
            const btnDesmontarA = document.getElementById('btnDesmontarA'); 
            const btnDesmontarB = document.getElementById('btnDesmontarB'); 
            const botoesPonto = ['btnPontoA', 'btnMenosPontoA', 'btnPontoB', 'btnMenosPontoB'];

            if (partidaEmAndamento) {
                btnFormarTimes.disabled = true;
                btnIniciar.disabled = true;
                btnFinalizar.disabled = false;
                btnDesmontarA.disabled = true; 
                btnDesmontarB.disabled = true; 
                botoesPonto.forEach(id => document.getElementById(id).disabled = false);
            } else {
                btnFormarTimes.disabled = false;
                btnFinalizar.disabled = true;
                btnDesmontarA.disabled = false; 
                btnDesmontarB.disabled = false; 
                botoesPonto.forEach(id => document.getElementById(id).disabled = true);
                
                if (timeA.length === 6 && timeB.length === 6) {
                    btnIniciar.disabled = false;
                } else {
                    btnIniciar.disabled = true;
                }
            }
        }
    </script>
</body>
</html>
