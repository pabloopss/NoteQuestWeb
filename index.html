<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoteQuest Web - Login</title>
    <style>
        :root { --bg: #050505; --panel: #151515; --text: #eee; --neon: #0fa; --gold: #ffd700; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--panel); border: 2px solid var(--neon); padding: 30px; width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 170, 0.1); text-align: center; }
        input { background: #000; color: #fff; border: 1px solid #555; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; font-size: 16px; border-radius: 4px; }
        button { background: var(--neon); color: #000; font-weight: bold; font-family: inherit; padding: 14px; border: none; cursor: pointer; width: 100%; margin-bottom: 10px; border-radius: 6px; font-size: 16px; }
        button.btn-sec { background: transparent; color: var(--neon); border: 2px solid var(--neon); }
        button.btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .escondido { display: none !important; }
    </style>
</head>
<body>

    <div id="tela-login" class="container">
        <h1 style="color: var(--neon); margin-top: 0; text-shadow: 0 0 10px var(--neon);">NOTEQUEST WEB</h1>
        <p id="status-msg" style="color: #ffaa00; font-size: 14px;">A conectar ao servidor...</p>
        
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Palavra-passe">
        
        <button id="btn-login">ENTRAR</button>
        <button id="btn-registrar" class="btn-sec">CRIAR NOVA CONTA</button>
        
        <div style="margin: 15px 0; color: #555;">ou</div>
        
        <button id="btn-google" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" height="20" alt="G"> 
            Entrar com o Google
        </button>
    </div>

    <script type="module">
        // Importamos tudo do nosso novo arquivo central!
        import { auth, db, googleProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signInWithPopup, doc, getDoc } from "./firebase.js";

        const EMAIL_DO_MESTRE = "pabloss.ti@gmail.com";
        const statusMsg = document.getElementById('status-msg');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                statusMsg.innerText = "Autenticado! A verificar ficha...";
                
                // 1. É o Mestre?
                if (user.email === EMAIL_DO_MESTRE && !sessionStorage.getItem('modo_jogador')) {
                    window.location.href = "mestre.html";
                    return;
                }

                // 2. É um jogador. Tem ficha?
                try {
                    const snap = await getDoc(doc(db, "personagens", user.uid));
                    if (snap.exists()) {
                        window.location.href = "mundo.html"; // Vai para o jogo!
                    } else {
                        window.location.href = "criacao.html"; // Vai criar o herói!
                    }
                } catch (error) {
                    statusMsg.innerText = "Erro ao ler base de dados: " + error.message;
                    statusMsg.style.color = "#f44";
                }
            } else {
                statusMsg.innerText = "Pronto para jogar.";
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message));
        document.getElementById('btn-registrar').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message));
        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, googleProvider).catch(e => alert(e.message));
    </script>
</body>
</html>
